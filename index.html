<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tinkery Chatbot | Stanford</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #FFFFFF;
            color: #1a1a1a;
            padding: 20px;
            text-align: center;
            font-family: 'Bungee', cursive;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            border-bottom: 3px solid #B83A4B;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            justify-content: center;
        }

        .reset-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Source Sans 3', sans-serif;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .reset-btn:hover {
            background: white;
            color: #B83A4B;
        }

        .chat-header .logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            overflow: hidden;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-header .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .chat-header .stanford-logo {
            height: 50px;
            max-width: 300px;
        }

        .chat-header .stanford-logo img {
            height: 100%;
            width: auto;
            object-fit: contain;
        }

        .chat-header .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #B83A4B;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            padding: 6px;
        }

        .message-avatar svg {
            width: 100%;
            height: 100%;
        }

        .message.user .message-avatar {
            background: #333;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
        }

        .message.bot .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message-content p {
            margin: 0 0 12px 0;
            line-height: 1.6;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content ul,
        .message-content ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message-content li {
            margin: 4px 0;
            line-height: 1.5;
        }

        .message-content strong {
            font-weight: 600;
            color: #B83A4B;
        }

        .message.user .message-content {
            background: #B83A4B;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            padding: 0 10px;
        }

        .quick-reply-btn {
            background: white;
            border: 2px solid #B83A4B;
            color: #B83A4B;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .quick-reply-btn:hover {
            background: #B83A4B;
            color: white;
        }

        .activity-card {
            background: linear-gradient(135deg, #B83A4B 0%, #c7520a 100%);
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-top: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 13px;
        }

        .activity-card:hover {
            transform: translateY(-2px);
        }

        .activity-card h4 {
            font-family: 'Bungee', cursive;
            margin-bottom: 6px;
            font-size: 15px;
        }

        .activity-card p {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .activity-meta {
            font-size: 11px;
            opacity: 0.8;
            display: flex;
            gap: 10px;
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 2px solid #f0f0f0;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            font-family: 'Source Sans 3', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: #B83A4B;
        }

        .send-btn {
            background: #B83A4B;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #c7520a;
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 12px 18px;
            background: white;
            border-radius: 18px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #B83A4B;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .link {
            color: #B83A4B;
            text-decoration: underline;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .chat-container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }

            .message-content {
                max-width: 80%;
            }
        }
    </style>
</head>

        // Add message to chat
        // Split text into readable chunks
        function splitIntoChunks(text) {
            const chunks = [];
            const sections = text.split(/\n\n+/);
            
            sections.forEach(section => {
                section = section.trim();
                if (!section) return;
                
                // Check if it's a list
                const listItems = section.match(/^[-\d+\.].+$/gm);
                if (listItems && listItems.length > 1) {
                    // Group list items in chunks of 3
                    for (let i = 0; i < listItems.length; i += 3) {
                        chunks.push(listItems.slice(i, i + 3).join('\n'));
                    }
                } else {
                    // Split long paragraphs
                    if (section.length > 200) {
                        const sentences = section.match(/[^.!?]+[.!?]+/g) || [section];
                        let currentChunk = '';
                        sentences.forEach(sentence => {
                            if ((currentChunk + sentence).length > 200 && currentChunk) {
                                chunks.push(currentChunk.trim());
                                currentChunk = sentence;
                            } else {
                                currentChunk += sentence;
                            }
                        });
                        if (currentChunk) chunks.push(currentChunk.trim());
                    } else {
                        chunks.push(section);
                    }
                }
            });
            
            return chunks.length > 0 ? chunks : [text];
        }

        // Calculate reading delay
        function getReadingDelay(text) {
            const minDelay = 3000; // 3 seconds minimum
            const maxDelay = 5000; // 5 seconds maximum
            const words = text.split(/\s+/).length;
            const delay = words * 250; // 250ms per word
            return Math.min(Math.max(delay, minDelay), maxDelay);
        }

        // Format Claude's markdown responses
        function formatMarkdown(text) {
            return text
                // Bold
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                // Bullet lists
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
                // Numbered lists
                .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/s, '<ol>$1</ol>')
                // Line breaks
                .replace(/\n/g, '<br/>');
        }

        function hideTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        // Add quick replies
        function addQuickReplies(replies) {
            const container = document.createElement('div');
            container.className = 'quick-replies';
            
            replies.forEach(reply => {
                const btn = document.createElement('button');
                btn.className = 'quick-reply-btn';
                btn.textContent = reply.text;
                btn.onclick = () => {
                    handleUserMessage(reply.value || reply.text);
                    container.remove();
                };
                container.appendChild(btn);
            });
            
            messagesContainer.appendChild(container);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Create activity card
        const CATEGORY_STYLE = {
            'Learn About AI':      { bg: '#e8f0fe', color: '#1a56db', emoji: '🧠' },
            'Use AI':              { bg: '#dcfce7', color: '#16a34a', emoji: '💻' },
            'Create With AI':      { bg: '#f3e8ff', color: '#7c3aed', emoji: '🎨' },
            'Learn/Teach With AI': { bg: '#fff7ed', color: '#ea580c', emoji: '📚' },
            'Shape AI':            { bg: '#ccfbf1', color: '#0f766e', emoji: '⚙️'  },
            'Thoughtful AI':       { bg: '#fee2e2', color: '#dc2626', emoji: '💭' }
        };

        function createActivityCard(activity) {
            const card = document.createElement('div');
            card.className = 'activity-card';
            card.onclick = () => handleActivityClick(activity);

            const style = CATEGORY_STYLE[activity.category] || { bg: '#f1f5f9', color: '#475569', emoji: '✨' };

            // Image with fallback placeholder
            const imgWrapper = document.createElement('div');
            imgWrapper.style.cssText = `width:100%;height:120px;border-radius:6px;margin-bottom:8px;overflow:hidden;`;

            if (activity.image) {
                const img = document.createElement('img');
                img.src = activity.image;
                img.alt = activity.name;
                img.style.cssText = 'width:100%;height:120px;object-fit:cover;display:block;';
                img.onerror = () => {
                    imgWrapper.removeChild(img);
                    imgWrapper.appendChild(makePlaceholder(style, activity.category));
                };
                imgWrapper.appendChild(img);
            } else {
                imgWrapper.appendChild(makePlaceholder(style, activity.category));
            }

            card.appendChild(imgWrapper);

            card.innerHTML += `
                <h4>${activity.name}</h4>
                <p>${activity.description}</p>
                <div class="activity-meta">
                    <span>⏱ ${activity.time}</span>
                    <span>👥 ${activity.audience.join(', ')}</span>
                    <span>📂 ${activity.category}</span>
                </div>
            `;

            return card;
        }

        function makePlaceholder(style, label) {
            const ph = document.createElement('div');
            ph.style.cssText = `width:100%;height:100%;background:${style.bg};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;`;
            ph.innerHTML = `<span style="font-size:2rem;">${style.emoji}</span><span style="font-size:0.75rem;font-weight:600;color:${style.color};text-align:center;padding:0 8px;">${label}</span>`;
            return ph;
        }

        // Handle activity click
        function handleActivityClick(activity) {
            state.currentActivity = activity;
            saveState();
            
            setTimeout(() => {
                showTyping();
                setTimeout(() => {
                    hideTyping();
                    addMessage(`Great choice! Let's explore <strong>${activity.name}</strong>.`);
                    
                    setTimeout(() => {
                        showTyping();
                        setTimeout(() => {
                            hideTyping();
                            addMessage(`This activity is designed for <strong>${activity.audience.join(' and ')}</strong> and takes about <strong>${activity.time}</strong> to complete.`);
                            
                            setTimeout(() => {
                                showTyping();
                                setTimeout(() => {
                                    hideTyping();
                                    addMessage(`<strong>What you'll do:</strong> ${activity.description}`);
                                    
                                    setTimeout(() => {
                                        showTyping();
                                        setTimeout(() => {
                                            hideTyping();
                                            addMessage(`You can access the full activity guide here: <a href="${activity.link}" target="_blank" class="link">${activity.name} Activity Guide</a>`);
                                            
                                            setTimeout(() => {
                                                addQuickReplies([
                                                    { text: '🔍 Find another activity', value: 'show activities' },
                                                    { text: '❓ Learn more about the Tinkery', value: 'tell me more' },
                                                    { text: '🔄 Start over', value: 'restart' }
                                                ]);
                                            }, 800);
                                        }, 1000);
                                    }, 800);
                                }, 1200);
                            }, 800);
                        }, 1200);
                    }, 800);
                }, 1500);
            }, 500);
        }

        // NATURAL LANGUAGE UNDERSTANDING FUNCTIONS
        
        // Detect user intent from message
        function detectIntent(message) {
            const msg = message.toLowerCase().trim();
            
            // Question about specific topics
            if (msg.includes('bias') || msg.includes('stereotype')) return { type: 'topic', topic: 'bias' };
            if (msg.includes('image') || msg.includes('picture') || msg.includes('visual')) return { type: 'topic', topic: 'images' };
            if (msg.includes('chatbot') || msg.includes('conversation')) return { type: 'topic', topic: 'chatbot' };
            if (msg.includes('game') || msg.includes('play')) return { type: 'topic', topic: 'games' };
            if (msg.includes('music') || msg.includes('audio') || msg.includes('sound')) return { type: 'topic', topic: 'music' };
            if (msg.includes('video') || msg.includes('film')) return { type: 'topic', topic: 'video' };
            if (msg.includes('math') || msg.includes('algorithm')) return { type: 'topic', topic: 'math' };
            if (msg.includes('agent') || msg.includes('automation')) return { type: 'topic', topic: 'agents' };
            if (msg.includes('prompt')) return { type: 'topic', topic: 'prompting' };
            if (msg.includes('3d') || msg.includes('vr')) return { type: 'topic', topic: '3d' };
            
            // Duration questions
            if (msg.match(/\d+\s*(min|hour|hr)/)) {
                const match = msg.match(/(\d+)\s*(min|hour|hr)/);
                return { type: 'duration', time: match[1], unit: match[2] };
            }
            
            // Beginner/difficulty questions
            if (msg.includes('beginner') || msg.includes('easy') || msg.includes('simple') || msg.includes('start')) return { type: 'difficulty', level: 'beginner' };
            if (msg.includes('advanced') || msg.includes('hard') || msg.includes('complex')) return { type: 'difficulty', level: 'advanced' };
            
            // Audience questions
            if (msg.includes('student') || msg.includes('kid') || msg.includes('child')) return { type: 'audience', group: 'students' };
            if (msg.includes('teacher') || msg.includes('educator') || msg.includes('adult')) return { type: 'audience', group: 'teachers' };
            
            // Concept questions
            if (msg.includes('curiosity board')) return { type: 'concept', name: 'curiosity-board' };
            if (msg.includes('tinker time')) return { type: 'concept', name: 'tinker-time' };
            if (msg.includes('working group')) return { type: 'concept', name: 'working-group' };
            if (msg.includes('task card')) return { type: 'concept', name: 'task-card' };
            if (msg.includes('principle') || msg.includes('guideline')) return { type: 'concept', name: 'principles' };
            if (msg.includes('tinkering') || msg.includes('tinker')) return { type: 'concept', name: 'tinkering' };
            
            // Implementation questions
            if (msg.includes('how to start') || msg.includes('how do i') || msg.includes('get started')) return { type: 'implementation', action: 'start' };
            if (msg.includes('equipment') || msg.includes('materials') || msg.includes('need')) return { type: 'implementation', action: 'equipment' };
            if (msg.includes('elementary') || msg.includes('primary') || msg.includes('age')) return { type: 'implementation', action: 'age' };
            
            return null;
        }

        // Recommend activities based on interests
        function recommendActivities(interests) {
            const interestWords = interests.toLowerCase().split(/\s+/);
            
            const scored = ACTIVITIES.map(activity => {
                let score = 0;
                interestWords.forEach(word => {
                    if (activity.keywords.some(kw => kw.includes(word) || word.includes(kw))) {
                        score += 3;
                    }
                    if (activity.name.toLowerCase().includes(word)) score += 2;
                    if (activity.description.toLowerCase().includes(word)) score += 1;
                    if (activity.category.toLowerCase().includes(word)) score += 2;
                });
                return { activity, score };
            });

            scored.sort((a, b) => b.score - a.score);
            
            const topActivities = scored.slice(0, 2).filter(s => s.score > 0);
            
            if (topActivities.length === 0) {
                // Random selection if no matches
                return ACTIVITIES.sort(() => Math.random() - 0.5).slice(0, 2);
            }
            
            return topActivities.map(s => s.activity);
        }

        // Claude AI Integration
        const CLAUDE_BACKEND_URL = '/api/claude';
        
        async function askClaude(userMessage) {
            const history = state.conversationHistory || [];
            
            // Search activities to provide context to Claude
            const msg = userMessage.toLowerCase();
            const keywords = msg.split(/\s+/).filter(w => w.length > 3);
            
            // Find relevant activities
            const relevantActivities = ACTIVITIES.map(activity => {
                const searchText = `${activity.name} ${activity.description} ${activity.category}`.toLowerCase();
                const matchCount = keywords.filter(keyword => searchText.includes(keyword)).length;
                return { activity, score: matchCount };
            })
            .filter(item => item.score > 0)
            .sort((a, b) => b.score - a.score)
            .slice(0, 5)
            .map(item => ({
                name: item.activity.name,
                time: item.activity.time,
                type: item.activity.type,
                description: item.activity.description,
                category: item.activity.category
            }));
            
            try {
                const response = await fetch(CLAUDE_BACKEND_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify({
                        message: userMessage,
                        history: history.slice(-10),
                        activities: relevantActivities
                    }),
                    redirect: 'follow'
                });
                
                // Debug: Log response status
                console.log('Response status:', response.status);
                console.log('Response OK:', response.ok);
                
                const responseText = await response.text();
                console.log('Raw response:', responseText);
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (parseError) {
                    console.error('JSON parse error:', parseError);
                    console.error('Response was:', responseText);
                    return null;
                }
                
                console.log('Parsed data:', data);
                
                if (data.success) {
                    if (!state.conversationHistory) {
                        state.conversationHistory = [];
                    }
                    state.conversationHistory.push(
                        { role: 'user', content: userMessage },
                        { role: 'assistant', content: data.response }
                    );
                    saveState();
                    
                    return data.response;
                } else {
                    console.error('Claude error:', data.error);
                    return null;
                }
            } catch (error) {
                console.error('Failed to reach Claude:', error);
                return null;
            }
        }

                        const randomActivities = ACTIVITIES.sort(() => Math.random() - 0.5).slice(0, 4);
                        return {
                            messages: [
                                "No problem! Let's explore a variety of activities:",
                                ...randomActivities.map(createActivityCard),
                                "Browse around and see what catches your eye!"
                            ],
                            quickReplies: [
                                { text: '🔄 Show me more', value: 'all activities' },
                                { text: '💡 I know my interest now', value: 'change interest' }
                            ]
                        };
                    }
                }
            }

            // Restart
            if (msg.includes('restart') || msg.includes('reset') || msg.includes('start over') || msg.includes('new user')) {
                return {
                    messages: ["Starting fresh! I'll clear the conversation and you can begin again."],
                    quickReplies: [
                        { text: '✅ Yes, start over', value: 'confirm-reset' },
                        { text: '❌ Cancel', value: 'cancel' }
                    ]
                };
            }

            if (msg.includes('confirm-reset')) {
                localStorage.removeItem('aiTinkeryState');
                location.reload();
                return { messages: [], quickReplies: null };
            }

            // Claude handles everything — activity cards are appended automatically
            const claudeResponse = await askClaude(userMessage);
            if (claudeResponse) {
                const activityCards = extractMatchedActivities(claudeResponse, userMessage);
                const quickReplies = generateSmartQuickReplies(userMessage, claudeResponse);
                return {
                    messages: [claudeResponse, ...activityCards.map(createActivityCard)],
                    quickReplies
                };
            }

            // Fallback if Claude is unreachable
            return {
                messages: [
                    "I'm having trouble connecting right now. Try asking me about AI activities, the Tinkery, or how to get started."
                ],
                quickReplies: [
                    { text: '🎯 Explore activities', value: 'show me some activities' },
                    { text: '📚 About the Tinkery', value: 'what is the AI Tinkery?' },
                    { text: '❓ Help', value: 'what can you help with?' }
                ]
            };
        }

        // Scan Claude's response and user message to find relevant activity cards to display
        function extractMatchedActivities(claudeResponse, userMessage) {
            const responseText = claudeResponse.toLowerCase();
            const userText = userMessage.toLowerCase();

            // 1. Exact activity name mentions in Claude's response
            const byName = ACTIVITIES.filter(a =>
                responseText.includes(a.name.toLowerCase())
            );
            if (byName.length > 0) {
                return byName.slice(0, 5);
            }

            // 2. Keyword-based matching, but only when the conversation is about activities
            const activityRelated =
                responseText.includes('activit') ||
                responseText.includes('recommend') ||
                responseText.includes('suggest') ||
                responseText.includes('try this') ||
                responseText.includes('check out') ||
                userText.includes('activit') ||
                userText.includes('recommend') ||
                userText.includes('suggest') ||
                userText.includes('what should i') ||
                userText.includes('what can i');

            if (activityRelated) {
                return recommendActivities(userMessage).slice(0, 5);
            }

            return [];
        }

        // Handle user message
        function handleUserMessage(message) {
            if (!message || message.trim() === '') return;

            // Add user message
            addMessage(message, true);
            userInput.value = '';

            // Show typing
            showTyping();

            // Get bot response
            setTimeout(async () => {
                hideTyping();
                const response = await botRespond(message);
                
                let totalDelay = 0;
                const hasQuickReplies = response.quickReplies;
                const allMessages = [];
                
                // Process messages into chunks
                response.messages.forEach((msg) => {
                    if (typeof msg === 'string') {
                        const chunks = splitIntoChunks(msg);
                        chunks.forEach(chunk => {
                            allMessages.push({type: 'text', content: chunk});
                        });
                    } else {
                        allMessages.push({type: 'card', content: msg});
                    }
                });
                
                // Display messages with delays
                allMessages.forEach((item, index) => {
                    setTimeout(() => {
                        if (item.type === 'text') {
                            showTyping();
                            setTimeout(() => {
                                hideTyping();
                                addMessage(item.content);
                            }, 800);
                        } else {
                            addMessage(item.content);
                        }
                        
                        // Add quick replies after last message
                        if (index === allMessages.length - 1 && hasQuickReplies) {
                            setTimeout(() => {
                                addQuickReplies(response.quickReplies);
                            }, 1000);
                        }
                    }, totalDelay);
                    
                    // Calculate next delay (minimum 5 seconds)
                    if (item.type === 'text') {
                        totalDelay += 800 + getReadingDelay(item.content);
                    } else {
                        totalDelay += 500;
                    }
                });
                });
            }, 1000);
        }

        // Send user info via email
        async function sendUserInfoEmail(name, affiliation) {
            try {
                const timestamp = new Date().toLocaleString();
                
                // Using Google Apps Script Web App endpoint
                // Replace YOUR_GOOGLE_APPS_SCRIPT_URL_HERE with deployed script URL
                const scriptUrl = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';
                
                const response = await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: name,
                        affiliation: affiliation,
                        timestamp: timestamp
                    })
                });
                
                console.log('User info sent:', name, affiliation);
            } catch (error) {
                console.error('Failed to send user info:', error);
            }
        }

        // Event listeners
        sendBtn.addEventListener('click', () => {
            handleUserMessage(userInput.value);
        });

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleUserMessage(userInput.value);
            }
        });

        // Reset button
        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm('Start over with a new user? This will clear the current conversation.')) {
                localStorage.removeItem('aiTinkeryState');
                location.reload();
            }
        });

        // Initial greeting
        window.addEventListener('load', () => {
            if (!state.userName) {
                setTimeout(() => {
                    addMessage("👋 Hi there! Welcome to the <strong>AI Tinkery</strong> at Stanford.");
                    setTimeout(() => {
                        showTyping();
                        setTimeout(() => {
                            hideTyping();
                            addMessage("We're a space to play, tinker, and learn about AI in hands-on, creative ways.");
                            setTimeout(() => {
                                showTyping();
                                setTimeout(() => {
                                    hideTyping();
                                    addMessage("Before we get started, I'd love to get to know you!");
                                    setTimeout(() => {
                                        handleUserMessage('start');
                                    }, 1000);
                                }, 1200);
                            }, 800);
                        }, 1500);
                    }, 1000);
                }, 500);
            } else {
                addMessage(`Welcome back, ${state.userName} from ${state.affiliation}! 👋`);
                setTimeout(() => {
                    addMessage("What would you like to do?");
                    setTimeout(() => {
                        addQuickReplies([
                            { text: '🎯 Explore activities', value: 'path:activities' },
                            { text: '🏫 Launch a Tinkery', value: 'path:launch' },
                            { text: '📚 About the Tinkery', value: 'tell me more' }
                        ]);
                    }, 800);
                }, 1000);
            }
        });
    </script>
