<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tinkery Chatbot | Stanford</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #E8620A;
            color: white;
            padding: 20px;
            text-align: center;
            font-family: 'Bungee', cursive;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            justify-content: center;
        }

        .reset-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Source Sans 3', sans-serif;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .reset-btn:hover {
            background: white;
            color: #E8620A;
        }

        .chat-header .logo {
            width: 35px;
            height: 35px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .chat-header .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #E8620A;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            padding: 6px;
        }

        .message-avatar svg {
            width: 100%;
            height: 100%;
        }

        .message.user .message-avatar {
            background: #333;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
        }

        .message.bot .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message.user .message-content {
            background: #E8620A;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            padding: 0 10px;
        }

        .quick-reply-btn {
            background: white;
            border: 2px solid #E8620A;
            color: #E8620A;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .quick-reply-btn:hover {
            background: #E8620A;
            color: white;
        }

        .activity-card {
            background: linear-gradient(135deg, #E8620A 0%, #c7520a 100%);
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-top: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 13px;
        }

        .activity-card:hover {
            transform: translateY(-2px);
        }

        .activity-card h4 {
            font-family: 'Bungee', cursive;
            margin-bottom: 6px;
            font-size: 15px;
        }

        .activity-card p {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .activity-meta {
            font-size: 11px;
            opacity: 0.8;
            display: flex;
            gap: 10px;
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 2px solid #f0f0f0;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            font-family: 'Source Sans 3', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: #E8620A;
        }

        .send-btn {
            background: #E8620A;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #c7520a;
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 12px 18px;
            background: white;
            border-radius: 18px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #E8620A;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .link {
            color: #E8620A;
            text-decoration: underline;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .chat-container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }

            .message-content {
                max-width: 80%;
            }
        }
    </style>
</head>

        function hideTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        // Add quick replies
        function addQuickReplies(replies) {
            const container = document.createElement('div');
            container.className = 'quick-replies';
            
            replies.forEach(reply => {
                const btn = document.createElement('button');
                btn.className = 'quick-reply-btn';
                btn.textContent = reply.text;
                btn.onclick = () => {
                    handleUserMessage(reply.value || reply.text);
                    container.remove();
                };
                container.appendChild(btn);
            });
            
            messagesContainer.appendChild(container);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Create activity card
        function createActivityCard(activity) {
            const card = document.createElement('div');
            card.className = 'activity-card';
            card.onclick = () => handleActivityClick(activity);
            
            const imageHtml = activity.image ? 
                `<img src="${activity.image}" alt="${activity.name}" style="width:100%;max-height:120px;object-fit:cover;border-radius:6px;margin-bottom:8px;">` : 
                '';
            
            card.innerHTML = `
                ${imageHtml}
                <h4>${activity.name}</h4>
                <p>${activity.description}</p>
                <div class="activity-meta">
                    <span>⏱ ${activity.time}</span>
                    <span>👥 ${activity.audience.join(', ')}</span>
                    <span>📂 ${activity.category}</span>
                </div>
            `;
            
            return card;
        }

        // Handle activity click
        function handleActivityClick(activity) {
            state.currentActivity = activity;
            saveState();
            
            setTimeout(() => {
                showTyping();
                setTimeout(() => {
                    hideTyping();
                    addMessage(`Great choice! Let's explore <strong>${activity.name}</strong>.`);
                    
                    setTimeout(() => {
                        showTyping();
                        setTimeout(() => {
                            hideTyping();
                            addMessage(`This activity is designed for <strong>${activity.audience.join(' and ')}</strong> and takes about <strong>${activity.time}</strong> to complete.`);
                            
                            setTimeout(() => {
                                showTyping();
                                setTimeout(() => {
                                    hideTyping();
                                    addMessage(`<strong>What you'll do:</strong> ${activity.description}`);
                                    
                                    setTimeout(() => {
                                        showTyping();
                                        setTimeout(() => {
                                            hideTyping();
                                            addMessage(`You can access the full activity guide here: <a href="${activity.link}" target="_blank" class="link">${activity.name} Activity Guide</a>`);
                                            
                                            setTimeout(() => {
                                                addQuickReplies([
                                                    { text: '🔍 Find another activity', value: 'show activities' },
                                                    { text: '❓ Learn more about the Tinkery', value: 'tell me more' },
                                                    { text: '🔄 Start over', value: 'restart' }
                                                ]);
                                            }, 800);
                                        }, 1000);
                                    }, 800);
                                }, 1200);
                            }, 800);
                        }, 1200);
                    }, 800);
                }, 1500);
            }, 500);
        }

        // NATURAL LANGUAGE UNDERSTANDING FUNCTIONS
        
        // Detect user intent from message
        function detectIntent(message) {
            const msg = message.toLowerCase().trim();
            
            // Question about specific topics
            if (msg.includes('bias') || msg.includes('stereotype')) return { type: 'topic', topic: 'bias' };
            if (msg.includes('image') || msg.includes('picture') || msg.includes('visual')) return { type: 'topic', topic: 'images' };
            if (msg.includes('chatbot') || msg.includes('conversation')) return { type: 'topic', topic: 'chatbot' };
            if (msg.includes('game') || msg.includes('play')) return { type: 'topic', topic: 'games' };
            if (msg.includes('music') || msg.includes('audio') || msg.includes('sound')) return { type: 'topic', topic: 'music' };
            if (msg.includes('video') || msg.includes('film')) return { type: 'topic', topic: 'video' };
            if (msg.includes('math') || msg.includes('algorithm')) return { type: 'topic', topic: 'math' };
            if (msg.includes('agent') || msg.includes('automation')) return { type: 'topic', topic: 'agents' };
            if (msg.includes('prompt')) return { type: 'topic', topic: 'prompting' };
            if (msg.includes('3d') || msg.includes('vr')) return { type: 'topic', topic: '3d' };
            
            // Duration questions
            if (msg.match(/\d+\s*(min|hour|hr)/)) {
                const match = msg.match(/(\d+)\s*(min|hour|hr)/);
                return { type: 'duration', time: match[1], unit: match[2] };
            }
            
            // Beginner/difficulty questions
            if (msg.includes('beginner') || msg.includes('easy') || msg.includes('simple') || msg.includes('start')) return { type: 'difficulty', level: 'beginner' };
            if (msg.includes('advanced') || msg.includes('hard') || msg.includes('complex')) return { type: 'difficulty', level: 'advanced' };
            
            // Audience questions
            if (msg.includes('student') || msg.includes('kid') || msg.includes('child')) return { type: 'audience', group: 'students' };
            if (msg.includes('teacher') || msg.includes('educator') || msg.includes('adult')) return { type: 'audience', group: 'teachers' };
            
            // Concept questions
            if (msg.includes('curiosity board')) return { type: 'concept', name: 'curiosity-board' };
            if (msg.includes('tinker time')) return { type: 'concept', name: 'tinker-time' };
            if (msg.includes('working group')) return { type: 'concept', name: 'working-group' };
            if (msg.includes('task card')) return { type: 'concept', name: 'task-card' };
            if (msg.includes('principle') || msg.includes('guideline')) return { type: 'concept', name: 'principles' };

        // Recommend activities based on interests
        function recommendActivities(interests) {
            const interestWords = interests.toLowerCase().split(/\s+/);
            
            const scored = ACTIVITIES.map(activity => {
                let score = 0;
                interestWords.forEach(word => {
                    if (activity.keywords.some(kw => kw.includes(word) || word.includes(kw))) {
                        score += 3;
                    }
                    if (activity.name.toLowerCase().includes(word)) score += 2;
                    if (activity.description.toLowerCase().includes(word)) score += 1;
                    if (activity.category.toLowerCase().includes(word)) score += 2;
                });
                return { activity, score };
            });

            scored.sort((a, b) => b.score - a.score);
            
            const topActivities = scored.slice(0, 3).filter(s => s.score > 0);
            
            if (topActivities.length === 0) {
                // Random selection if no matches
                return ACTIVITIES.sort(() => Math.random() - 0.5).slice(0, 3);
            }
            
            return topActivities.map(s => s.activity);
        }

        // Claude AI Integration
        const CLAUDE_BACKEND_URL = 'https://script.google.com/macros/s/AKfycbygP5mGHqEprhWDEVhEYahonPnPhZLSpwLoGo5n39-RttowqSp_qKAs1MEYERrZ0kaz/exec';
        
        async function askClaude(userMessage) {
            const history = state.conversationHistory || [];
            
            // Search activities to provide context to Claude
            const msg = userMessage.toLowerCase();
            const keywords = msg.split(/\s+/).filter(w => w.length > 3);
            
            // Find relevant activities
            const relevantActivities = ACTIVITIES.map(activity => {
                const searchText = `${activity.name} ${activity.description} ${activity.category}`.toLowerCase();
                const matchCount = keywords.filter(keyword => searchText.includes(keyword)).length;
                return { activity, score: matchCount };
            })
            .filter(item => item.score > 0)
            .sort((a, b) => b.score - a.score)
            .slice(0, 5)
            .map(item => ({
                name: item.activity.name,
                time: item.activity.time,
                type: item.activity.type,
                description: item.activity.description,
                category: item.activity.category
            }));
            
            try {
                const response = await fetch(CLAUDE_BACKEND_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify({
                        message: userMessage,
                        history: history.slice(-10),
                        activities: relevantActivities
                    }),
                    redirect: 'follow'
                });
                
                // Debug: Log response status
                console.log('Response status:', response.status);
                console.log('Response OK:', response.ok);
                
                const responseText = await response.text();
                console.log('Raw response:', responseText);
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (parseError) {
                    console.error('JSON parse error:', parseError);
                    console.error('Response was:', responseText);
                    return null;
                }
                
                console.log('Parsed data:', data);
                
                if (data.success) {
                    if (!state.conversationHistory) {
                        state.conversationHistory = [];
                    }
                    state.conversationHistory.push(
                        { role: 'user', content: userMessage },
                        { role: 'assistant', content: data.response }
                    );
                    saveState();
                    
                    return data.response;
                } else {
                    console.error('Claude error:', data.error);
                    return null;
                }
            } catch (error) {
                console.error('Failed to reach Claude:', error);
                return null;
            }
        }

                        "🔧 <strong>Applied</strong> — Trying, testing, and learning by doing",
                        "💭 <strong>Thoughtful</strong> — Understanding AI as a system to be questioned and shaped",
                        "We have <strong>26 hands-on activities</strong> across six categories:",
                        "• Learn About AI",
                        "• Use AI",
                        "• Create With AI",
                        "• Learn/Teach With AI",
                        "• Shape AI",
                        "• Thoughtful AI"
                    ],
                    quickReplies: [
                        { text: '🎯 Explore activities', value: 'path:activities' },
                        { text: '🏫 Launch a Tinkery', value: 'path:launch' },
                        { text: '🌐 Join the community', value: 'community' }
                    ]
                };
            }

            // Community / Satellite Network
            if (msg.includes('community') || msg.includes('network') || msg.includes('connect')) {
                return {
                    messages: [
                        "The <strong>AI Tinkery Satellite Network</strong> is a growing community of educators and schools experimenting with AI together.",
                        "Satellites connect through <strong>quarterly meetups</strong> to share what works, reflect on challenges, and imagine what comes next.",
                        "You can join by visiting <a href='https://ai-tinkery.stanford.edu' target='_blank' class='link'>ai-tinkery.stanford.edu</a> and signing up!",
                        "Share your experiments using <strong>#AITinkery</strong> and <strong>#StanfordAcceleratorforLearning</strong>"
                    ],
                    quickReplies: [
                        { text: '🎯 Explore activities', value: 'path:activities' },
                        { text: '🏫 Launch a Tinkery', value: 'path:launch' }
                    ]
                };
            }

            // How to launch a Tinkery
            if (msg.includes('launch') || msg.includes('start') || msg.includes('create tinkery')) {
                return {
                    messages: [
                        "Starting your own Tinkery is flexible! Here's how:",
                        "<strong>1. Create a space, try some activities</strong><br>Pick one activity and set it up in your classroom or hallway. Let learners engage!",
                        "<strong>2. Share with others</strong><br>Document what you tried and share online using #AITinkery",
                        "<strong>3. Join the Satellite Network</strong><br>Connect with other educators at quarterly community meetups",
                        "A Tinkery can be:",
                        "• A hallway display (Curiosity Board)",
                        "• A class warm-up activity",
                        "• A dedicated room or makerspace",
                        "• Drop-in workshop sessions",
                        "Start small and grow from there!"
                    ],
                    quickReplies: [
                        { text: '🎯 See activities', value: 'show activities' },
                        { text: '🌐 Join the network', value: 'community' }
                    ]
                };
            }

            // Change interest / discover interests
            if (msg.includes('change interest') || (msg.includes('show') && msg.includes('activities')) || msg.includes('explore') || msg.includes('browse')) {
                return {
                    messages: [
                        "What aspects of AI are you most curious about?"
                    ],
                    quickReplies: [
                        { text: '🎨 Creating things with AI', value: 'interest:creating' },
                        { text: '🧠 Understanding how AI works', value: 'interest:learning' },
                        { text: '📚 Teaching with AI', value: 'interest:teaching' },
                        { text: '⚖️ AI ethics & impact', value: 'interest:ethics' },
                        { text: '🔧 Building AI systems', value: 'interest:building' },
                        { text: '🤷 Show me everything', value: 'all activities' }
                    ]
                };
            }

            // Tinkery structure & formats
            if (msg.includes('structure') || msg.includes('format')) {
                return {
                    messages: [
                        "A Tinkery can take many forms:",
                        '<img src="https://raw.githubusercontent.com/aitinkery/ai-tinkery-chatbot/main/images/tinkery-formats.jpg" alt="Tinkery Formats" style="width:100%;max-width:700px;border-radius:12px;margin:10px 0;">'
                    ],
                    quickReplies: [
                        { text: '👥 Who runs a Tinkery?', value: 'tinkery roles' },
                        { text: '🚀 How to launch', value: 'launch tinkery' },
                        { text: '🎯 See activities', value: 'show activities' }
                    ]
                };
            }

            // Tinkery roles
            if (msg.includes('roles') || msg.includes('people') || msg.includes('who runs')) {
                return {
                    messages: [
                        "You don't need every role to start. Even one or two people can spark momentum.",
                        "<strong>Key roles:</strong>",
                        "🎪 <strong>Tinker Time Facilitator</strong> — Runs workshops where participants play and tinker with AI",
                        "👥 <strong>Working Group Leader</strong> — Leads small cohorts (3+ meetings) to go deeper on a topic",
                        "🧑‍🏫 <strong>Mentor 1:1</strong> — Models curiosity, provides coaching, pilots new practices",
                        "🌐 <strong>Community Connector</strong> — Keeps momentum between sessions (Slack, newsletter, quick questions)",
                        "⚙️ <strong>Manager</strong> — Coordinates activities, supports mentors, provides continuity",
                        "🛠️ <strong>Builder</strong> — Sets up spaces with interactive displays and resources",
                        "<strong>Mentorship model:</strong> We rely on part-time mentors (paid staff or volunteers, including students) who grow community capacity and spark creative applications."
                    ],
                    quickReplies: [
                        { text: '📐 Tinkery formats', value: 'tinkery structure' },
                        { text: '🚀 How to launch', value: 'launch tinkery' },
                        { text: '🎯 See activities', value: 'show activities' }
                    ]
                };
            }

            // All activities - show random selection
            if (msg.includes('all activities') || msg.includes('everything') || msg.includes('see all')) {
                const randomActivities = ACTIVITIES.sort(() => Math.random() - 0.5).slice(0, 5);
                return {
                    messages: [
                        "Here are some activities you might enjoy:",
                        ...randomActivities.map(createActivityCard),
                        "Tap any activity to learn more! Or tell me what interests you and I can recommend something specific."
                    ],
                    quickReplies: null
                };
            }

            // Recommend based on interests
            if (msg.length > 10 && !msg.includes('show') && !msg.includes('tell')) {
                state.interests.push(userMessage);
                saveState();
                
                const recommended = recommendActivities(userMessage);
                
                if (recommended.length > 0) {
                    return {
                        messages: [
                            `Based on your interest in "${userMessage}", here are some activities I think you'll like:`,
                            ...recommended.map(createActivityCard),
                            "Tap any activity to get started!"
                        ],
                        quickReplies: [
                            { text: '🔍 Search again', value: 'show activities' },
                            { text: '📚 About the Tinkery', value: 'tell me more' }
                        ]
                    };
                } else {
                    return {
                        messages: [
                            "I couldn't find a perfect match, but here are some popular activities:",
                            ...ACTIVITIES.slice(0, 3).map(createActivityCard)
                        ],
                        quickReplies: [
                            { text: '🔍 Try another search', value: 'show activities' }
                        ]
                    };
                }
            }

            // Restart
            if (msg.includes('restart') || msg.includes('reset') || msg.includes('start over') || msg.includes('new user')) {
                return {
                    messages: [
                        "Starting fresh! I'll clear the conversation and you can begin again."
                    ],
                    quickReplies: [
                        { text: '✅ Yes, start over', value: 'confirm-reset' },
                        { text: '❌ Cancel', value: 'help' }
                    ]
                };
            }

            // Confirm reset
            if (msg.includes('confirm-reset')) {
                localStorage.removeItem('aiTinkeryState');
                location.reload();
                return { messages: [], quickReplies: null };
            }

            // INTELLIGENT NATURAL LANGUAGE UNDERSTANDING
            // Parse intent from user message
            const intent = detectIntent(userMessage);
            
            if (intent) {
                return generateSmartResponse(intent, userMessage);
            }

            // Try Claude AI before fallback
            const claudeResponse = await askClaude(userMessage);
            if (claudeResponse) {
                // Generate context-aware quick replies
                const quickReplies = generateSmartQuickReplies(userMessage, claudeResponse);
                
                return {
                    messages: [claudeResponse],
                    quickReplies: quickReplies
                };
            }

            // Default fallback response (if Claude fails)
            return {
                messages: [
                    "I'm having trouble connecting right now. Here's what I can help with:",
                    "• <strong>Explore activities</strong> — Find hands-on AI activities",
                    "• <strong>Learn about the Tinkery</strong> — Understand our approach",
                    "• <strong>Join the community</strong> — Connect with other educators",
                    "What interests you?"
                ],
                quickReplies: [
                    { text: '🎯 Explore activities', value: 'show activities' },
                    { text: '📚 About the Tinkery', value: 'tell me more' },
                    { text: '❓ What can you do?', value: 'help' }
                ]
            };
        }

        // Handle user message
        function handleUserMessage(message) {
            if (!message || message.trim() === '') return;

            // Add user message
            addMessage(message, true);
            userInput.value = '';

            // Show typing
            showTyping();

            // Get bot response
            setTimeout(async () => {
                hideTyping();
                const response = await botRespond(message);
                
                response.messages.forEach((msg, index) => {
                    setTimeout(() => {
                        if (typeof msg === 'string') {
                            showTyping();
                            setTimeout(() => {
                                hideTyping();
                                addMessage(msg);
                                
                                // Add quick replies after last message
                                if (index === response.messages.length - 1 && response.quickReplies) {
                                    setTimeout(() => {
                                        addQuickReplies(response.quickReplies);
                                    }, 500);
                                }
                            }, 800);
                        } else {
                            // It's an element (activity card)
                            addMessage(msg);
                            
                            // Add quick replies after last message
                            if (index === response.messages.length - 1 && response.quickReplies) {
                                setTimeout(() => {
                                    addQuickReplies(response.quickReplies);
                                }, 500);
                            }
                        }
                    }, index * 1200);
                });
            }, 1000);
        }

        // Send user info via email
        async function sendUserInfoEmail(name, affiliation) {
            try {
                const timestamp = new Date().toLocaleString();
                
                // Using Google Apps Script Web App endpoint
                // Replace YOUR_GOOGLE_APPS_SCRIPT_URL_HERE with deployed script URL
                const scriptUrl = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';
                
                const response = await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: name,
                        affiliation: affiliation,
                        timestamp: timestamp
                    })
                });
                
                console.log('User info sent:', name, affiliation);
            } catch (error) {
                console.error('Failed to send user info:', error);
            }
        }

        // Event listeners
        sendBtn.addEventListener('click', () => {
            handleUserMessage(userInput.value);
        });

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleUserMessage(userInput.value);
            }
        });

        // Reset button
        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm('Start over with a new user? This will clear the current conversation.')) {
                localStorage.removeItem('aiTinkeryState');
                location.reload();
            }
        });

        // Initial greeting
        window.addEventListener('load', () => {
            if (!state.userName) {
                setTimeout(() => {
                    addMessage("👋 Hi there! Welcome to the <strong>AI Tinkery</strong> at Stanford.");
                    setTimeout(() => {
                        showTyping();
                        setTimeout(() => {
                            hideTyping();
                            addMessage("We're a space to play, tinker, and learn about AI in hands-on, creative ways.");
                            setTimeout(() => {
                                showTyping();
                                setTimeout(() => {
                                    hideTyping();
                                    addMessage("Before we get started, I'd love to get to know you!");
                                    setTimeout(() => {
                                        handleUserMessage('start');
                                    }, 1000);
                                }, 1200);
                            }, 800);
                        }, 1500);
                    }, 1000);
                }, 500);
            } else {
                addMessage(`Welcome back, ${state.userName} from ${state.affiliation}! 👋`);
                setTimeout(() => {
                    addMessage("What would you like to do?");
                    setTimeout(() => {
                        addQuickReplies([
                            { text: '🎯 Explore activities', value: 'path:activities' },
                            { text: '🏫 Launch a Tinkery', value: 'path:launch' },
                            { text: '📚 About the Tinkery', value: 'tell me more' }
                        ]);
                    }, 800);
                }, 1000);
            }
        });
    </script>
</body>
</html>
